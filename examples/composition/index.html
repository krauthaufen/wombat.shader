<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>wombat.shader — composition (composeStages)</title>
  <style>
    body { margin: 0; background: #111; color: #eee; font-family: system-ui, sans-serif; padding: 1em; }
    h1 { font-size: 16px; margin: 0 0 0.5em 0; }
    main { display: grid; grid-template-columns: 360px 1fr; gap: 1em; }
    canvas { width: 360px; height: 360px; image-rendering: pixelated; background: #000; }
    pre { font-size: 11px; line-height: 1.3; color: #bdb; white-space: pre; max-height: 80vh; overflow: auto; padding: 0.5em; background: #1a1a1a; border-radius: 4px; }
    h2 { font-size: 13px; margin: 0.5em 0 0.2em; opacity: 0.7; }
  </style>
</head>
<body>
  <h1>composition: two fragment shaders fused into one (GLSL ES 3.00)</h1>
  <main>
    <section>
      <canvas id="c" width="360" height="360"></canvas>
      <h2>before (separate)</h2>
      <pre id="before"></pre>
      <h2>after (composeStages)</h2>
      <pre id="after"></pre>
    </section>
    <section>
      <h2>info</h2>
      <pre id="log"></pre>
    </section>
  </main>
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
